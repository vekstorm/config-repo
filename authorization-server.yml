server:
  port: 9000

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  datasource:
    url: jdbc:postgresql://{AUTH_DB_HOST}:{AUTH_DB_HOST}/{AUTH_DB_NAME}?createDatabaseIfNotExist=true
    username: ${AUTH_DB_USER}
    password: ${AUTH_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG

base:
  url: http://authorization-server:9000

defaults:
  admin-role: ROLE_ADMIN
  user-role: ROLE_USER
  admin-email: admin@email.com
  admin-password: ${ADMIN_PASSWORD}
  user-email: user@email.com
  user-password: ${USER_PASSWORD}
  client-id: oidc-client
  client-secret: ${CLIENT_SECRET}
  client-name: OIDC Debugger
  client-scope: openid
  identity-client-secret: ${IDENTITY_CLIENT_SECRET}
  client-credentials-grant-type: client_credentials
  authorization-code-grant-type: authorization_code
  refresh-token-grant-type: refresh_token
  redirect-uri: https://oauthdebugger.com/debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: swagger-ui
      use-pkce-with-authorization-code-grant: true
  api-docs:
    path: /api-docs
