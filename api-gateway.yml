server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: authorization-server
          uri: http://authorization-server:9000
          predicates:
            - Path=/oauth2/**, /login/**, /api-docs/**
          filters:
            - StripPrefix=0

        - id: devices-api
          uri: http://devices-api:8083
          predicates:
            - Path=/api/v1/devices/**
          filters:
            - StripPrefix=0

        - id: files-api
          uri: http://files-api:8084
          predicates:
            - Path=/api/v1/files/**
          filters:
            - StripPrefix=0

        - id: subscription
          uri: http://subscription:8082
          predicates:
            - Path=/api/v1/subscriptions/**
          filters:
            - StripPrefix=0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://authorization-server:9000
